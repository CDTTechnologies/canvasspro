# =============================================================================
# Nginx Configuration — CanvassPro
# =============================================================================
#
# This is a REFERENCE config file. The setup.sh script generates the actual
# config automatically. Use this if you want to set up Nginx manually or
# customize beyond what the script provides.
#
# QUICK SETUP:
#   1. Replace __APP_DOMAIN__ with your domain (or use "_" for IP-based)
#   2. Replace __APP_PORT__  with your app port (default: 3000)
#   3. Replace __APP_DIR__   with your app directory (default: /opt/canvasspro)
#   4. Copy to /etc/nginx/sites-available/canvasspro
#   5. ln -s /etc/nginx/sites-available/canvasspro /etc/nginx/sites-enabled/
#   6. nginx -t && systemctl reload nginx
#
# FOR SSL:
#   After setting up with HTTP, run:
#     sudo apt install certbot python3-certbot-nginx
#     sudo certbot --nginx -d yourdomain.com
#
# =============================================================================

