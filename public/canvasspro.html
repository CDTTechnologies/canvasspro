<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:#0D1117;color:#E6EDF3}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#161B22}
::-webkit-scrollbar-thumb{background:#30363D;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#484F58}
.leaflet-container{background:#0D1117!important;font-family:'DM Sans',sans-serif!important}
.leaflet-popup-content-wrapper{background:#161B22!important;color:#E6EDF3!important;border:1px solid #30363D!important;border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important}
.leaflet-popup-tip{background:#161B22!important;border:1px solid #30363D!important}
.leaflet-popup-close-button{color:#8B949E!important}
.marker-cluster-small{background:rgba(212,148,58,.25)!important}
.marker-cluster-small div{background:rgba(212,148,58,.5)!important;color:#fff!important;font-family:'Space Grotesk',sans-serif!important;font-weight:600!important}
.marker-cluster-medium{background:rgba(212,148,58,.3)!important}
.marker-cluster-medium div{background:rgba(212,148,58,.6)!important;color:#fff!important;font-family:'Space Grotesk',sans-serif!important;font-weight:600!important}
.marker-cluster-large{background:rgba(212,148,58,.35)!important}
.marker-cluster-large div{background:rgba(212,148,58,.7)!important;color:#fff!important;font-family:'Space Grotesk',sans-serif!important;font-weight:600!important}
.status-btn{transition:all .15s ease;position:relative;overflow:hidden}
.status-btn:active{transform:scale(.95)}
.status-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .15s}
.status-btn:hover::after{opacity:1}
.slide-in{animation:slideIn .3s ease forwards}
.slide-out{animation:slideOut .25s ease forwards}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(-100%);opacity:0}}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pulse-dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
.glass{background:rgba(22,27,34,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.nav-item{transition:all .2s}
.nav-item.active{color:#D4943A}
.nav-item.active .nav-indicator{transform:scaleX(1)}
.nav-indicator{transform:scaleX(0);transition:transform .2s}
.field-row:hover{background:rgba(212,148,58,.05)}
.toast{animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards}
@keyframes toastIn{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(20px)}}
@media(max-width:768px){.desktop-only{display:none!important}.mobile-only{display:flex!important}}
@media(min-width:769px){.mobile-only{display:none!important}}
.stat-card{position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(212,148,58,.08) 0%,transparent 70%);pointer-events:none}
input,select,textarea{background:#0D1117!important;border:1px solid #30363D!important;color:#E6EDF3!important;border-radius:8px!important;padding:10px 14px!important;font-family:'DM Sans',sans-serif!important;font-size:14px!important;outline:none!important;transition:border-color .2s!important}
input:focus,select:focus,textarea:focus{border-color:#D4943A!important;box-shadow:0 0 0 3px rgba(212,148,58,.15)!important}
textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn:active{transform:scale(.97)}
.btn-primary{background:#D4943A;color:#0D1117}.btn-primary:hover{background:#E0A44A}
.btn-secondary{background:#30363D;color:#E6EDF3}.btn-secondary:hover{background:#3D444D}
.btn-danger{background:rgba(248,81,73,.15);color:#F85149;border:1px solid rgba(248,81,73,.3)}.btn-danger:hover{background:rgba(248,81,73,.25)}
.btn-ok{background:rgba(63,185,80,.15);color:#3FB950;border:1px solid rgba(63,185,80,.3)}.btn-ok:hover{background:rgba(63,185,80,.25)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500;background:rgba(212,148,58,.12);color:#F0C878;border:1px solid rgba(212,148,58,.2)}
.detect-card{transition:all .2s;border:1px solid #30363D}
.detect-card:hover{border-color:rgba(212,148,58,.3)}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center" style="background:linear-gradient(135deg,#0D1117 0%,#161B22 40%,#1a1510 100%)">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 rounded-full" style="background:radial-gradient(circle,rgba(212,148,58,.08),transparent 70%)"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 rounded-full" style="background:radial-gradient(circle,rgba(212,148,58,.05),transparent 70%)"></div>
  </div>
  <div class="relative w-full max-w-md mx-4 p-8 rounded-2xl border border-border bg-card fade-in">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-accent/10 border border-accent/20 mb-4">
        <i class="fa-solid fa-clipboard-check text-accent text-2xl"></i>
      </div>
      <h1 class="font-display text-3xl font-bold text-fg tracking-tight">CanvassPro</h1>
      <p class="text-muted text-sm mt-1">Campaign Canvassing Tool</p>
    </div>
    <div id="loginError" class="hidden mb-4 p-3 rounded-lg bg-err/10 border border-err/30 text-err text-sm text-center"></div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-muted mb-1.5">Username</label>
        <input id="loginUser" type="text" placeholder="Enter username" class="w-full" autocomplete="username">
      </div>
      <div>
        <label class="block text-sm font-medium text-muted mb-1.5">Password</label>
        <input id="loginPass" type="password" placeholder="Enter password" class="w-full" autocomplete="current-password">
      </div>
      <button id="loginBtn" class="btn btn-primary w-full justify-center text-base py-3 mt-2">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </div>
    <div class="mt-6 p-4 rounded-lg bg-bg/50 border border-border">
      <p class="text-xs text-muted mb-2 font-medium">Demo Accounts:</p>
      <div class="space-y-1 text-xs text-muted">
        <div class="flex justify-between"><span>Admin</span><code class="text-fg/70">admin / admin123</code></div>
        <div class="flex justify-between"><span>Staff</span><code class="text-fg/70">staff / staff123</code></div>
        <div class="flex justify-between"><span>Volunteer</span><code class="text-fg/70">volunteer / vol123</code></div>
      </div>
    </div>
  </div>
</div>

<!-- App Shell -->
<div id="appShell" class="hidden h-full flex flex-col">
  <header class="glass border-b border-border flex-shrink-0 z-40">
    <div class="flex items-center justify-between h-14 px-4">
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-clipboard-check text-accent"></i>
          <span class="font-display font-bold text-lg text-fg tracking-tight desktop-only">CanvassPro</span>
        </div>
      </div>
      <nav class="flex items-center gap-1 desktop-only">
        <button onclick="switchView('dashboard')" data-nav="dashboard" class="nav-item px-4 py-2 rounded-lg text-sm font-medium text-muted hover:text-fg flex flex-col items-center relative">
          <i class="fa-solid fa-chart-pie text-base mb-0.5"></i><span class="text-xs">Dashboard</span>
          <div class="nav-indicator absolute bottom-0 left-2 right-2 h-0.5 bg-accent rounded-full"></div>
        </button>
        <button onclick="switchView('search')" data-nav="search" class="nav-item px-4 py-2 rounded-lg text-sm font-medium text-muted hover:text-fg flex flex-col items-center relative">
          <i class="fa-solid fa-magnifying-glass text-base mb-0.5"></i><span class="text-xs">Search</span>
          <div class="nav-indicator absolute bottom-0 left-2 right-2 h-0.5 bg-accent rounded-full"></div>
        </button>
        <button onclick="switchView('map')" data-nav="map" class="nav-item px-4 py-2 rounded-lg text-sm font-medium text-muted hover:text-fg flex flex-col items-center relative">
          <i class="fa-solid fa-map-location-dot text-base mb-0.5"></i><span class="text-xs">Map</span>
          <div class="nav-indicator absolute bottom-0 left-2 right-2 h-0.5 bg-accent rounded-full"></div>
        </button>
        <button id="navImportDesktop" onclick="switchView('import')" data-nav="import" class="nav-item px-4 py-2 rounded-lg text-sm font-medium text-muted hover:text-fg flex flex-col items-center relative">
          <i class="fa-solid fa-file-import text-base mb-0.5"></i><span class="text-xs">Import</span>
          <div class="nav-indicator absolute bottom-0 left-2 right-2 h-0.5 bg-accent rounded-full"></div>
        </button>
        <button id="navUsersDesktop" onclick="switchView('users')" data-nav="users" class="nav-item px-4 py-2 rounded-lg text-sm font-medium text-muted hover:text-fg flex flex-col items-center relative">
          <i class="fa-solid fa-users-gear text-base mb-0.5"></i><span class="text-xs">Users</span>
          <div class="nav-indicator absolute bottom-0 left-2 right-2 h-0.5 bg-accent rounded-full"></div>
        </button>
      </nav>
      <div class="flex items-center gap-3">
        <span id="gpsIndicator" class="hidden text-ok text-xs flex items-center gap-1"><span class="pulse-dot w-2 h-2 rounded-full bg-ok inline-block"></span>GPS</span>
        <div class="flex items-center gap-2">
          <div id="userAvatar" class="w-8 h-8 rounded-full bg-accent/20 border border-accent/30 flex items-center justify-center text-accent text-xs font-bold"></div>
          <div class="desktop-only">
            <p id="userName" class="text-sm font-medium text-fg leading-tight"></p>
            <p id="userRole" class="text-xs text-muted leading-tight capitalize"></p>
          </div>
          <button onclick="logout()" class="text-muted hover:text-err ml-2" title="Sign Out"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden relative">
    <aside id="detailsPanel" class="hidden absolute md:relative w-full md:w-[400px] lg:w-[440px] h-full bg-card border-r border-border flex-shrink-0 flex flex-col overflow-hidden" style="z-index:1001;box-shadow:4px 0 24px rgba(0,0,0,.4)">
      <div id="detailsPanelContent" class="flex-1 overflow-y-auto"></div>
    </aside>
    <div id="viewsContainer" class="flex-1 overflow-hidden flex flex-col">
      <div id="dashboardView" class="flex-1 overflow-y-auto p-4 md:p-6"></div>
      <div id="searchView" class="hidden flex-1 overflow-hidden flex flex-col"></div>
      <div id="mapView" class="hidden flex-1 relative">
        <div id="mapFilters" class="absolute top-3 left-3 right-3 flex gap-2 flex-wrap" style="z-index:1000"></div>
        <div id="mapContainer" class="w-full h-full"></div>
      </div>

      <div id="usersView" class="hidden flex-1 overflow-y-auto p-4 md:p-6"></div>

  </div>

  <nav class="mobile-only glass border-t border-border flex-shrink-0 z-40 flex items-center justify-around h-16">

      <i class="fa-solid fa-chart-pie text-lg"></i><span class="text-[10px] font-medium">Dashboard</span>
      <div class="nav-indicator w-4 h-0.5 bg-accent rounded-full mt-0.5"></div>
    </button>
    <button onclick="switchView('search')" data-nav="search" class="nav-item flex flex-col items-center gap-0.5 py-1 px-3 text-muted">
      <i class="fa-solid fa-magnifying-glass text-lg"></i><span class="text-[10px] font-medium">Search</span>
      <div class="nav-indicator w-4 h-0.5 bg-accent rounded-full mt-0.5"></div>
    </button>
    <button onclick="switchView('map')" data-nav="map" class="nav-item flex flex-col items-center gap-0.5 py-1 px-3 text-muted">
      <i class="fa-solid fa-map-location-dot text-lg"></i><span class="text-[10px] font-medium">Map</span>
      <div class="nav-indicator w-4 h-0.5 bg-accent rounded-full mt-0.5"></div>
    </button>
    <button id="navImportMobile" onclick="switchView('import')" data-nav="import" class="nav-item flex flex-col items-center gap-0.5 py-1 px-3 text-muted">
      <i class="fa-solid fa-file-import text-lg"></i><span class="text-[10px] font-medium">Import</span>
      <div class="nav-indicator w-4 h-0.5 bg-accent rounded-full mt-0.5"></div>
    </button>
    <button id="navUsersMobile" onclick="switchView('users')" data-nav="users" class="nav-item flex flex-col items-center gap-0.5 py-1 px-3 text-muted">
      <i class="fa-solid fa-users-gear text-lg"></i><span class="text-[10px] font-medium">Users</span>
      <div class="nav-indicator w-4 h-0.5 bg-accent rounded-full mt-0.5"></div>

  </nav>
</div>

<div id="toastContainer" class="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 items-center pointer-events-none"></div>

<div id="visitModal" class="hidden fixed inset-0 flex items-end md:items-center justify-center bg-black/60" style="z-index:9999">
  <div class="bg-card border border-border rounded-t-2xl md:rounded-2xl w-full md:max-w-lg max-h-[90vh] overflow-y-auto fade-in">

      <h3 class="font-display font-bold text-lg">Record Visit</h3>
      <button onclick="closeVisitModal()" class="text-muted hover:text-fg text-xl"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="visitModalBody" class="p-5 space-y-4"></div>
  </div>
</div>

<!-- User Modal -->
<div id="userModal" class="hidden fixed inset-0 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" style="z-index:10000">
  <div class="bg-card border border-border rounded-2xl w-full max-w-md p-6 shadow-2xl">
    <h3 id="userModalTitle" class="font-display text-lg font-bold mb-4">Add User</h3>
    <input type="hidden" id="umId">
    <div class="space-y-3">
      <div><label class="block text-xs font-medium text-muted mb-1">Full Name</label><input id="umName" type="text" placeholder="John Smith" class="w-full text-sm"></div>
      <div><label class="block text-xs font-medium text-muted mb-1">Username</label><input id="umUsername" type="text" placeholder="jsmith" class="w-full text-sm"></div>
      <div><label class="block text-xs font-medium text-muted mb-1">Password <span id="umPwHint" class="text-muted/50">(leave blank to keep current)</span></label><input id="umPassword" type="password" placeholder="••••••••" class="w-full text-sm"></div>

    </div>
    <div class="flex gap-2 mt-5">
      <button onclick="saveUser()" class="btn btn-primary flex-1 justify-center"><i class="fa-solid fa-check"></i> Save</button>
      <button onclick="closeUserModal()" class="btn btn-secondary flex-1 justify-center">Cancel</button>
    </div>
  </div>
</div>

<script>

/* Fields to display prominently per voter card */
const PRIORITY_FIELDS=['LastName','FirstName','MidInitial','PartyLastPrimary','Sex','Race','DOB','Phone','Email','RegDate','Status','LastGenDate','LastPrimaryDate'];

/* ========== UTILITIES ========== */
const $=id=>document.getElementById(id);
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const parseDate=d=>{if(!d)return null;const s=String(d).trim();if(!s)return null;/* MM/DD/YYYY */const m=s.match(/^(\d{1,2})[\/](\d{1,2})[\/](\d{4})$/);if(m)return new Date(+m[3],+m[1]-1,+m[2]);/* YYYY-MM-DD or ISO */let dt=new Date(s);return isNaN(dt.getTime())?null:dt};
const fmtDate=d=>{const dt=parseDate(d);if(!dt)return d||'—';return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
const fmtYYMM=d=>{if(!d)return'—';const s=String(d).trim();const m=s.match(/^(\d{2})(\d{2})$/);if(!m)return d;const yr=2000+parseInt(m[1]);const mo=parseInt(m[2]);if(mo<1||mo>12)return d;return new Date(yr,mo-1).toLocaleDateString('en-US',{month:'long',year:'numeric'})};
const calcAge=d=>{const dt=parseDate(d);if(!dt)return null;const today=new Date();let age=today.getFullYear()-dt.getFullYear();const m=today.getMonth()-dt.getMonth();if(m<0||(m===0&&today.getDate()<dt.getDate()))age--;return age};
const fmtDateTime=dt=>{if(!dt)return'—';try{return new Date(dt).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}catch{return dt}};
const fmtPhone=p=>{if(!p)return'—';const c=p.replace(/\D/g,'');if(c.length===10)return`(${c.slice(0,3)}) ${c.slice(3,6)}-${c.slice(6)}`;if(c.length===11&&c[0]==='1')return`(${c.slice(1,4)}) ${c.slice(4,7)}-${c.slice(7)}`;return p};
const fmtCurrency=v=>{if(!v)return'—';const n=parseFloat(v);if(isNaN(n))return v;return'$'+n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})};

/* Generate a readable label for any field name, even ones not in our map */
const fieldLabel=f=>{
  if(FIELD_LABELS[f])return FIELD_LABELS[f];
  /* Strip common prefixes */
  let clean=f.replace(/^Prop_/,'Prop. ').replace(/^GIS_/,'GIS ').replace(/^Mail/,'Mail ').replace(/^Birth_/,'Birth ');
  /* Insert spaces before uppercase letters and numbers */
  clean=clean.replace(/([a-z])([A-Z0-9])/g,'$1 $2').replace(/_/g,' ');
  /* Title-case it */
  clean=clean.replace(/\b\w/g,c=>c.toUpperCase()).replace(/\s+/g,' ').trim();
  return clean;
};

const partyColor=p=>PARTY_COLORS[p]||'#8B949E';
const partyLabel=p=>PARTY_LABELS[p]||(p||'Unknown');
const statusCfg=s=>STATUS_CONFIG[s]||STATUS_CONFIG.not_visited;

/* Household key: normalize address fields for grouping */
const houseKey=v=>{
  const a=(v.Address||'').trim().toUpperCase().replace(/\s+/g,' ');
  const u=(v.AptorBoxNumber||'').trim().toUpperCase().replace(/\s+/g,' ');
  const z=(v.ZipCode||'').trim();
  return a+'|'+u+'|'+z;
};

function toast(msg,type='info'){
  const c=$('toastContainer');
  const colors={info:'border-info bg-info/10 text-info',ok:'border-ok bg-ok/10 text-ok',err:'border-err bg-err/10 text-err',warn:'border-warn bg-warn/10 text-warn'};
  const icons={info:'fa-circle-info',ok:'fa-circle-check',err:'fa-circle-exclamation',warn:'fa-triangle-exclamation'};

  el.className=`toast pointer-events-auto px-4 py-3 rounded-xl border ${colors[type]||colors.info} text-sm font-medium flex items-center gap-2 shadow-lg`;
  el.innerHTML=`<i class="fa-solid ${icons[type]||icons.info}"></i>${esc(msg)}`;

}

function initAuth(){
  fetch('/api/seed').catch(()=>{});
  const saved=localStorage.getItem('cp_session');
  if(saved){try{S.user=JSON.parse(saved);showApp()}catch{}}
  $('loginBtn').onclick=doLogin;
  $('loginPass').onkeydown=e=>{if(e.key==='Enter')doLogin()};
  $('loginUser').onkeydown=e=>{if(e.key==='Enter')$('loginPass').focus()};
}
async function doLogin(){
  const u=$('loginUser').value.trim().toLowerCase(),p=$('loginPass').value;
  try{
    const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    if(!res.ok){$('loginError').textContent='Invalid username or password';$('loginError').classList.remove('hidden');return}
    const user=await res.json();
    S.user={name:user.name,role:user.role,username:user.username,id:user.id};
    localStorage.setItem('cp_session',JSON.stringify(S.user));showApp();
  }catch(e){
    $('loginError').textContent='Login failed — server error';$('loginError').classList.remove('hidden');
  }
}
function logout(){
  S.user=null;localStorage.removeItem('cp_session');
  $('appShell').classList.add('hidden');$('loginScreen').classList.remove('hidden');
  $('loginUser').value='';$('loginPass').value='';$('loginError').classList.add('hidden');
}
async function showApp(){
  $('loginScreen').classList.add('hidden');$('appShell').classList.remove('hidden');
  $('userName').textContent=S.user.name;$('userRole').textContent=S.user.role;
  $('userAvatar').textContent=S.user.name.split(' ').map(w=>w[0]).join('').slice(0,2);

}

async function loadData(){
  try{
    const res=await fetch('/api/data');
    if(!res.ok)return;
    const data=await res.json();
    S.headers=data.headers||[];
    S.voters=(data.voters||[]).map(v=>({...v.data,householdId:v.householdId}));
    S.households=new Map();
    S.householdDbIds=new Map();
    const dbIdToKey=new Map();
    (data.households||[]).forEach(h=>{
      const hh={
        id:h.householdKey,
        address:h.address||'',
        apt:h.apt||'',
        fullAddress:h.fullAddress||'',
        city:h.city||'',
        state:h.state||'',
        zip:h.zip||'',
        lat:h.lat,
        lng:h.lng,
        precinct:h.precinct||'',
        district:h.district||'',
        senateDistrict:h.senateDistrict||'',
        commissionDistrict:h.commissionDistrict||'',
        schoolDistrict:h.schoolDistrict||'',
        subdivision:h.subdivision||'',
        zoning:h.zoning||'',
        neighborhoodCode:h.neighborhoodCode||'',
        landUse:h.landUse||'',
        propertyType:h.propertyType||'',
        matchType:h.matchType||'',
        status:h.status||'not_visited',
        assignedTo:h.assignedTo||'',
        visits:h.visits||[],
        notes:h.notes||'',
        tags:h.tags||[],
        voters:[]
      };
      S.households.set(h.householdKey,hh);
      S.householdDbIds.set(h.householdKey,h.id);
      dbIdToKey.set(h.id,h.householdKey);
    });
    /* Populate voters into households by matching voter.householdId to household DB id */
    S.voters.forEach(v=>{
      const key=dbIdToKey.get(v.householdId);
      if(key){const hh=S.households.get(key);if(hh)hh.voters.push(v)}
    });
  }catch(e){
    console.error('Failed to load data',e);
  }
}

/* Clean a header name: remove BOM, trim whitespace, collapse internal spaces */
function cleanHeader(h){
  return h.replace(/^\uFEFF/,'').replace(/^\u200B/,'').trim().replace(/\s+/g,' ');
}

function processFile(file){
  const st=$('importStatus');st.classList.remove('hidden');
  st.innerHTML=`<div class="flex items-center gap-3 p-4 bg-accent/10 border border-accent/20 rounded-xl"><i class="fa-solid fa-spinner fa-spin text-accent text-lg"></i><div><p class="font-medium text-sm">Reading ${esc(file.name)} (${(file.size/1024/1024).toFixed(2)} MB)...</p><p class="text-muted text-xs">Detecting format and parsing</p></div></div>`;
  $('importPreview').classList.add('hidden');

  const delimiterVal=$('importDelimiter').value;
  const skipRows=parseInt($('importSkip').value)||0;
  const encoding=$('importEncoding').value;

  /* Build PapaParse config */
  const config={
    header:true,
    skipEmptyLines:true,
    encoding:encoding,
    skipFirstNLines:skipRows,
    transformHeader:h=>cleanHeader(h),
    complete:function(results){
      handleParseComplete(results,file);
    },
    error:function(err){
      st.innerHTML=`<div class="p-4 bg-err/10 border border-err/20 rounded-xl text-err text-sm"><i class="fa-solid fa-circle-exclamation mr-2"></i>Read error: ${esc(err.message)}</div>`;
    }
  };

  /* Set delimiter: empty string = auto-detect, otherwise use specified */
  if(delimiterVal==='')config.delimiter='';
  else if(delimiterVal==='\\t')config.delimiter='\t';
  else config.delimiter=delimiterVal;

  Papa.parse(file,config);
}

function handleParseComplete(results,file){
  const st=$('importStatus');
  const pv=$('importPreview');

  if(results.errors.length){
    const critical=results.errors.filter(e=>e.type==='FieldMismatch'||e.type==='Quotes');
    const warnings=results.errors.filter(e=>e.type!=='FieldMismatch'&&e.type!=='Quotes');
    if(warnings.length>5){
      st.innerHTML=`<div class="p-4 bg-warn/10 border border-warn/20 rounded-xl text-warn text-sm"><i class="fa-solid fa-triangle-exclamation mr-2"></i>${warnings.length} parse warnings. Attempting to continue...<br><span class="text-xs opacity-70">${esc(warnings[0].message)} (row ${warnings[0].row})</span></div>`;
    }
  }

  if(!results.data||!results.data.length){
    st.innerHTML=`<div class="p-4 bg-err/10 border border-err/20 rounded-xl text-err text-sm"><i class="fa-solid fa-circle-exclamation mr-2"></i>No data rows found. Check your delimiter setting — if your file uses <strong>pipe (|)</strong> characters, select "Pipe" from the delimiter dropdown above and re-import.</div>`;
    return;
  }

  const headers=results.meta.fields||[];
  if(!headers.length){
    st.innerHTML=`<div class="p-4 bg-err/10 border border-err/20 rounded-xl text-err text-sm"><i class="fa-solid fa-circle-exclamation mr-2"></i>No column headers detected. Ensure the first data row contains header names, or increase "Skip First Rows" if there's a title line.</div>`;
    return;
  }

  /* Show preview of detected headers */
  const keyFields=['Address','AptorBoxNumber','City','State','ZipCode','LastName','FirstName','PartyLastPrimary','Latitude','Longitude','PrecinctName'];
  const found=keyFields.filter(f=>headers.includes(f));
  const missing=keyFields.filter(f=>!headers.includes(f));

  pv.classList.remove('hidden');
  pv.innerHTML=`
    <div class="detect-card bg-card rounded-xl p-5">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-display font-semibold text-sm"><i class="fa-solid fa-table-columns text-accent mr-2"></i>Detected ${headers.length} Columns</h3>
        <span class="text-xs text-muted">Delimiter: ${esc(results.meta.delimiter||'auto')}</span>
      </div>
      <div class="flex flex-wrap gap-1 mb-3 max-h-32 overflow-y-auto">
        ${headers.map(h=>{
          const isKey=keyFields.includes(h);
          return`<span class="inline-block px-2 py-0.5 rounded text-[11px] font-mono ${isKey?'bg-accent/15 text-accent border border-accent/25':'bg-bg/80 text-muted border border-border/50'}">${esc(h)}</span>`;
        }).join('')}
      </div>
      ${missing.length?`<div class="p-3 bg-warn/8 border border-warn/20 rounded-lg mb-3"><p class="text-xs text-warn font-medium mb-1"><i class="fa-solid fa-triangle-exclamation mr-1"></i>Missing key columns:</p><p class="text-xs text-warn/70">${missing.map(f=>`<code>${f}</code>`).join(', ')}</p><p class="text-xs text-muted mt-1">The app will still work but some features may be limited.</p></div>`:''}
      <div class="flex gap-2">
        <button onclick="confirmImport()" class="btn btn-primary flex-1 justify-center"><i class="fa-solid fa-check"></i> Import ${results.data.length.toLocaleString()} Records</button>
        <button onclick="$('importPreview').classList.add('hidden')" class="btn btn-secondary">Cancel</button>
      </div>
    </div>`;

  /* Store parsed results for confirmation */
  window._pendingImport={headers,data:results.data};

  st.innerHTML=`<div class="flex items-center gap-3 p-4 bg-ok/10 border border-ok/20 rounded-xl text-ok text-sm"><i class="fa-solid fa-circle-check text-lg"></i><div><p class="font-medium">Parsed ${results.data.length.toLocaleString()} records with ${headers.length} columns</p><p class="text-xs opacity-70">Review the detected columns below, then confirm import</p></div></div>`;
}

function confirmImport(){
  if(!window._pendingImport)return;
  const{headers,data}=window._pendingImport;
  window._pendingImport=null;
  $('importPreview').classList.add('hidden');

  S.headers=headers;
  S.voters=data;
  groupHouseholds();

  const withGps=[...S.households.values()].filter(h=>h.lat&&h.lng).length;
  const st=$('importStatus');
  st.innerHTML=`<div class="p-4 bg-ok/10 border border-ok/20 rounded-xl text-ok text-sm"><i class="fa-solid fa-circle-check mr-2"></i>Imported <strong>${S.voters.length.toLocaleString()}</strong> voters across <strong>${S.households.size.toLocaleString()}</strong> households. ${withGps} with GPS coordinates.</div>`;
  toast(`Imported ${S.voters.length} voters`,'ok');
  renderImportView();

  /* Sync to API in background, then reload to get DB IDs */
  fetch('/api/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({headers:S.headers,voters:S.voters})})
    .then(r=>r.json()).then(result=>{
      if(result.ok)loadData();
    }).catch(e=>toast('Failed to sync to server: '+e.message,'err'));
}

function groupHouseholds(){
  S.households.clear();
  S.householdDbIds.clear();
  S.voters.forEach(v=>{
    const key=houseKey(v);
    if(!S.households.has(key)){
      const lat=parseFloat(v.Latitude),lng=parseFloat(v.Longitude);
      S.households.set(key,{
        id:key,
        address:(v.Address||'').trim(),
        apt:(v.AptorBoxNumber||'').trim(),
        fullAddress:[v.Address,v.AptorBoxNumber,v.City,v.State,v.ZipCode].filter(x=>x&&x.trim()).join(' ').trim(),
        city:(v.City||'').trim(),state:(v.State||'').trim(),zip:(v.ZipCode||'').trim(),
        lat:isNaN(lat)?null:lat,lng:isNaN(lng)?null:lng,
        precinct:(v.PrecinctName||'').trim(),
        district:(v.StateHouseDistrict||'').trim(),
        senateDistrict:(v.StateSenateDistrict||'').trim(),
        commissionDistrict:(v.CountyCommissionDistrict||'').trim(),
        schoolDistrict:(v.SchoolDistrict||'').trim(),
        subdivision:(v.Prop_SubdivisionName||'').trim(),
        zoning:(v.Prop_ZoningDescription||'').trim(),
        neighborhoodCode:(v.Prop_NeighborhoodCode||'').trim(),
        landUse:(v.Prop_LandUseType||'').trim(),
        propertyType:(v.Prop_PropertyType||'').trim(),
        matchType:(v.Prop_MatchType||'').trim(),
        status:'not_visited',assignedTo:'',visits:[],notes:'',tags:[],voters:[]
      });
    }
    S.households.get(key).voters.push(v);
  });
}

async function clearData(){
  if(!confirm('Clear all imported data? This cannot be undone.'))return;
  try{await fetch('/api/data',{method:'DELETE'})}catch(e){toast('Failed to clear server data: '+e.message,'err')}
  S.headers=[];S.voters=[];S.households.clear();S.householdDbIds.clear();S.selectedId=null;
  localStorage.removeItem('cp_data');localStorage.removeItem('cp_canvass');
  toast('Data cleared','ok');renderImportView();closeDetails();
}

function exportCSV(){
  if(!S.voters.length)return toast('No data to export','warn');
  const rows=[];
  S.households.forEach(h=>{
    h.voters.forEach(v=>{
      const row={...v,_CanvassStatus:h.status,_AssignedTo:h.assignedTo,_Notes:h.notes,_LastVisit:h.visits.length?h.visits[h.visits.length-1].date:'','_Tags':h.tags.join(';')};
      rows.push(row);
    });
  });
  const csv=Papa.unparse(rows);
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`canvass_export_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast('CSV exported','ok');
}

/* ========== VIEW SWITCHING ========== */
function switchView(view){
  S.currentView=view;
  ['dashboard','search','map','import','users'].forEach(v=>{$(v+'View').classList.toggle('hidden',v!==view)});
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    const isActive=btn.dataset.nav===view;
    btn.classList.toggle('active',isActive);btn.classList.toggle('text-fg',isActive);
  });
  if(view==='dashboard')renderDashboard();
  if(view==='search')renderSearchView();
  if(view==='map')initMap();
  if(view==='import')renderImportView();
  if(view==='users')renderUsersView();
  if(view!=='map'&&S.map)setTimeout(()=>S.map.invalidateSize(),100);
}

/* ========== DASHBOARD ========== */
function renderDashboard(){
  const hh=[...S.households.values()];
  const total=hh.length,voters=S.voters.length;
  const visited=hh.filter(h=>h.status==='visited').length;
  const remaining=hh.filter(h=>h.status==='not_visited').length;
  const followUp=hh.filter(h=>h.status==='follow_up').length;
  const dnr=hh.filter(h=>h.status==='do_not_return').length;
  const today=new Date().toISOString().slice(0,10);
  const visitsToday=hh.reduce((c,h)=>c+h.visits.filter(v=>v.date===today).length,0);
  const teamStats={};
  hh.forEach(h=>h.visits.forEach(v=>{if(!teamStats[v.volunteer])teamStats[v.volunteer]={count:0};teamStats[v.volunteer].count++}));
  const precinctStats={};
  hh.forEach(h=>{const p=h.precinct||'Unknown';if(!precinctStats[p])precinctStats[p]={total:0,visited:0};precinctStats[p].total++;if(h.status==='visited')precinctStats[p].visited++});
  const pctDone=total?Math.round(visited/total*100):0;

  $('dashboardView').innerHTML=`
    <div class="max-w-6xl mx-auto fade-in">
      <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-3">
        <div>
          <h2 class="font-display text-2xl font-bold">Campaign Dashboard</h2>
          <p class="text-muted text-sm">${total?`Tracking ${total.toLocaleString()} households, ${voters.toLocaleString()} voters`:'No data loaded — import a CSV to begin'}</p>
        </div>
        ${S.isAdmin?(total?`<button onclick="switchView('import')" class="btn btn-secondary text-sm"><i class="fa-solid fa-file-import"></i> Import More</button>`:`<button onclick="switchView('import')" class="btn btn-primary text-sm"><i class="fa-solid fa-file-import"></i> Import CSV</button>`):''}
      </div>
      ${total?`
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
        <div class="stat-card bg-card border border-border rounded-xl p-4"><p class="text-muted text-xs font-medium mb-1">Households</p><p class="font-display text-2xl font-bold">${total.toLocaleString()}</p></div>
        <div class="stat-card bg-card border border-border rounded-xl p-4"><p class="text-muted text-xs font-medium mb-1">Voters</p><p class="font-display text-2xl font-bold">${voters.toLocaleString()}</p></div>
        <div class="stat-card bg-card border border-border rounded-xl p-4"><p class="text-muted text-xs font-medium mb-1">Visited</p><p class="font-display text-2xl font-bold text-ok">${visited.toLocaleString()}</p></div>
        <div class="stat-card bg-card border border-border rounded-xl p-4"><p class="text-muted text-xs font-medium mb-1">Remaining</p><p class="font-display text-2xl font-bold text-muted">${remaining.toLocaleString()}</p></div>
        <div class="stat-card bg-card border border-border rounded-xl p-4"><p class="text-muted text-xs font-medium mb-1">Follow-ups</p><p class="font-display text-2xl font-bold text-warn">${followUp.toLocaleString()}</p></div>
        <div class="stat-card bg-card border border-border rounded-xl p-4"><p class="text-muted text-xs font-medium mb-1">Do Not Return</p><p class="font-display text-2xl font-bold text-err">${dnr.toLocaleString()}</p></div>
      </div>
      <div class="bg-card border border-border rounded-xl p-5 mb-6">
        <div class="flex items-center justify-between mb-2"><span class="text-sm font-medium">Overall Progress</span><span class="text-sm font-bold text-accent">${pctDone}%</span></div>
        <div class="w-full h-3 bg-bg rounded-full overflow-hidden"><div class="h-full rounded-full transition-all duration-700" style="width:${pctDone}%;background:linear-gradient(90deg,#D4943A,#F0C878)"></div></div>
        <div class="flex gap-4 mt-3 text-xs text-muted">
          <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-ok inline-block"></span>Visited ${visited}</span>

      </div>
      <div class="grid md:grid-cols-2 gap-6 mb-6">
        <div class="bg-card border border-border rounded-xl p-5">
          <h3 class="font-display font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-calendar-day text-accent"></i> Today's Activity</h3>
          <div class="flex items-center gap-4 mb-4">

}
function toggleSearchFilters(){$('searchFiltersPanel').classList.toggle('hidden')}
function getFilterOptions(field){const s=new Set();S.voters.forEach(v=>{if(v[field])s.add(v[field].trim())});return[...s].sort()}
function getPrecinctOptions(){const s=new Set();S.households.forEach(h=>{if(h.precinct)s.add(h.precinct)});return[...s].sort()}
function getVolunteerOptions(){const s=new Set();S.households.forEach(h=>{if(h.assignedTo)s.add(h.assignedTo);h.visits.forEach(v=>{if(v.volunteer)s.add(v.volunteer)})});return[...s].sort()}
function applyFilters(){
  S.filters.party=$('sfParty')?.value||'';S.filters.status=$('sfStatus')?.value||'';
  S.filters.precinct=$('sfPrecinct')?.value||'';S.filters.volunteer=$('sfVolunteer')?.value||'';
  doSearch();
}
function getFilteredHouseholds(){
  let list=[...S.households.values()];
  if(S.filters.status)list=list.filter(h=>h.status===S.filters.status);
  if(S.filters.precinct)list=list.filter(h=>h.precinct===S.filters.precinct);
  if(S.filters.volunteer)list=list.filter(h=>h.assignedTo===S.filters.volunteer||h.visits.some(v=>v.volunteer===S.filters.volunteer));
  if(S.filters.party)list=list.filter(h=>h.voters.some(v=>v.PartyLastPrimary===S.filters.party));
  if(S.filters.search){const q=S.filters.search.toLowerCase();list=list.filter(h=>{if(h.fullAddress.toLowerCase().includes(q))return true;return h.voters.some(v=>(`${v.FirstName||''} ${v.LastName||''} ${v.MidInitial||''}`).toLowerCase().includes(q))})}
  return list;
}
function doSearch(){
  const c=$('searchResults');if(!c)return;
  const results=getFilteredHouseholds();
  if(!results.length){c.innerHTML=`<div class="text-center py-12"><i class="fa-solid fa-magnifying-glass text-3xl text-muted/30 mb-3 block"></i><p class="text-muted text-sm">${S.households.size?'No households match your search':'No data loaded'}</p></div>`;return}
  const show=results.slice(0,200);
  c.innerHTML=show.map(h=>{const sc=statusCfg(h.status);const parties=[...new Set(h.voters.map(v=>v.PartyLastPrimary).filter(Boolean))];return`<button onclick="selectHousehold('${h.id}')" class="w-full text-left bg-card hover:bg-cardhover border border-border rounded-xl p-3.5 transition-colors"><div class="flex items-start justify-between gap-3"><div class="min-w-0 flex-1"><p class="font-medium text-sm truncate">${esc(h.fullAddress)}</p><p class="text-xs text-muted mt-0.5">${h.voters.length} voter${h.voters.length>1?'s':''} &middot; ${esc(h.precinct||'No precinct')}</p><div class="flex flex-wrap gap-1 mt-2">${parties.map(p=>`<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold" style="background:${partyColor(p)}20;color:${partyColor(p)};border:1px solid ${partyColor(p)}30">${partyLabel(p)}</span>`).join('')}${h.tags.map(t=>`<span class="tag text-[10px]">${esc(t)}</span>`).join('')}</div></div><div class="flex flex-col items-end gap-1 flex-shrink-0"><span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-[11px] font-semibold" style="background:${sc.bg};color:${sc.color};border:1px solid ${sc.border}"><i class="fa-solid ${sc.icon} text-[10px]"></i>${sc.label}</span>${h.assignedTo?`<span class="text-[10px] text-muted"><i class="fa-solid fa-user text-[8px] mr-1"></i>${esc(h.assignedTo.split(' ')[0])}</span>`:''}</div></div></button>`}).join('');
  if(results.length>200)c.innerHTML+=`<p class="text-center text-muted text-xs py-3">Showing 200 of ${results.length} results.</p>`;
}

/* ========== MAP ========== */
function initMap(){
  if(S.map){S.map.invalidateSize();updateMapMarkers();return}
  const center=S.gpsPos?[S.gpsPos.lat,S.gpsPos.lng]:[35.05,-85.05];
  S.map=L.map('mapContainer',{zoomControl:false}).setView(center,13);
  L.control.zoom({position:'bottomright'}).addTo(S.map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19}).addTo(S.map);
  S.markers=L.markerClusterGroup({maxClusterRadius:50,spiderfyOnMaxZoom:true,showCoverageOnHover:false,iconCreateFunction:function(cluster){const count=cluster.getChildCount();let size='small';if(count>50)size='medium';if(count>200)size='large';return L.divIcon({html:`<div>${count}</div>`,className:`marker-cluster marker-cluster-${size}`,iconSize:L.point(40,40)})}});
  S.map.addLayer(S.markers);

}
function renderMapFilters(){

    </div>
    <select id="mfStatusMobile" class="md:hidden text-xs py-2 px-2.5 flex-shrink-0" onchange="setMapStatusFilter(this.value)"><option value="">All Status</option>${Object.entries(STATUS_CONFIG).map(([k,v])=>`<option value="${k}" ${S.filters.status===k?'selected':''}>${v.label}</option>`).join('')}</select>

    </div>
    <select id="mfParty" class="text-xs py-2 px-2.5 flex-shrink-0" onchange="updateMapMarkers()"><option value="">All Parties</option>${getFilterOptions('PartyLastPrimary').map(o=>`<option value="${o}" ${S.filters.party===o?'selected':''}>${partyLabel(o)}</option>`).join('')}</select>
    ${S.gpsPos?`<button onclick="S.map.setView([${S.gpsPos.lat},${S.gpsPos.lng}],16)" class="btn btn-secondary text-xs py-2 px-3 flex-shrink-0" title="My Location"><i class="fa-solid fa-location-crosshairs"></i></button>`:''}`;

function setMapStatusFilter(status){
  S.filters.status=status;

function updateMapMarkers(){
  if(!S.markers)return;S.markers.clearLayers();S.markerMap.clear();
  const statusF=S.filters.status||'',partyF=$('mfParty')?.value||'',searchF=S.filters.search.toLowerCase();
  S.households.forEach(h=>{
    if(!h.lat||!h.lng)return;
    if(statusF&&h.status!==statusF)return;
    if(partyF&&!h.voters.some(v=>v.PartyLastPrimary===partyF))return;
    if(searchF){if(!h.fullAddress.toLowerCase().includes(searchF)&&!h.voters.some(v=>(`${v.FirstName||''} ${v.LastName||''}`).toLowerCase().includes(searchF)))return}
    const sc=statusCfg(h.status);const parties=[...new Set(h.voters.map(v=>v.PartyLastPrimary).filter(Boolean))];
    const icon=L.divIcon({className:'',iconSize:[28,28],iconAnchor:[14,14],html:`<div style="width:28px;height:28px;border-radius:50%;background:${sc.color};border:3px solid rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif">${h.voters.length}</div>`});

    marker.on('popupopen',function(){const btn=this.getPopup().getElement()?.querySelector('.sv-detail-btn');if(!btn)return;btn.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();selectHousehold(this.dataset.id)},{passive:false});btn.addEventListener('click',function(e){e.stopPropagation();selectHousehold(this.dataset.id)})});
    S.markers.addLayer(marker);S.markerMap.set(h.id,marker);
  });
  const layers=S.markers.getLayers();
  if(layers.length&&!S.filters.search&&!statusF&&!partyF){const b=S.markers.getBounds();if(b.isValid())S.map.fitBounds(b,{padding:[40,40],maxZoom:15})}
}

      ${h.visits.length?`<p class="text-[10px] text-muted mt-2">Last visit: ${fmtDateTime(h.visits[h.visits.length-1].date+'T'+h.visits[h.visits.length-1].time)}</p>`:''}
    </div>
    <div class="p-4">
      <p class="text-xs text-muted font-medium mb-2 uppercase tracking-wider">Household Notes</p>
      <textarea id="householdNotes" rows="3" placeholder="Add notes about this household..." class="w-full text-sm">${esc(h.notes)}</textarea>
      <button onclick="saveNotes('${id}')" class="btn btn-secondary text-xs py-2 mt-2 w-full justify-center"><i class="fa-solid fa-floppy-disk"></i> Save Notes</button>
      <div class="mt-4"><p class="text-xs text-muted font-medium mb-2">Assign Volunteer</p><div class="flex gap-2"><input id="assignInput" type="text" placeholder="Volunteer name" class="flex-1 text-sm" value="${esc(h.assignedTo)}"><button onclick="assignVolunteer('${id}')" class="btn btn-secondary text-xs py-2 px-3">Assign</button></div></div>
    </div>`;

  panel.classList.remove('hidden');panel.classList.add('slide-in');panel.classList.remove('slide-out');
  if(isMobile()&&S.currentView!=='map')switchView('map');
}

function closeDetails(){
  const p=$('detailsPanel');p.classList.add('slide-out');p.classList.remove('slide-in');
  setTimeout(()=>{p.classList.add('hidden');p.classList.remove('slide-out');S.selectedId=null},250);
}
function panToHousehold(id){
  const h=S.households.get(id);if(!h||!h.lat||!h.lng)return;
  if(S.currentView!=='map')switchView('map');
  setTimeout(()=>{S.map.setView([h.lat,h.lng],17);const m=S.markerMap.get(id);if(m)m.openPopup()},200);
}

/* ========== CANVASSING ACTIONS ========== */
function setStatus(id,status){
  const h=S.households.get(id);if(!h)return;
  const oldStatus=h.status;if(oldStatus===status)return;
  h.status=status;
  const dbId=S.householdDbIds.get(id);
  if(dbId){
    fetch(`/api/households/${dbId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})}).catch(e=>toast('Failed to save status: '+e.message,'err'));
    /* Record status change in canvassing history */
    const now=new Date();
    const visit={volunteer:S.user?S.user.name:'Unknown',date:now.toISOString().slice(0,10),time:now.toTimeString().slice(0,5),outcome:'Status changed to '+STATUS_CONFIG[status].label,statusAfter:status,notes:''};
    h.visits.push(visit);
    fetch(`/api/households/${dbId}/visits`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(visit)}).catch(()=>{});
  }
  toast(`Status: ${STATUS_CONFIG[status].label}`,'ok');selectHousehold(id);
  if(S.currentView==='map')updateMapMarkers();if(S.currentView==='search')doSearch();
}
function saveNotes(id){
  const h=S.households.get(id);if(!h)return;h.notes=$('householdNotes').value;
  const dbId=S.householdDbIds.get(id);
  if(dbId){fetch(`/api/households/${dbId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:h.notes})}).catch(e=>toast('Failed to save notes: '+e.message,'err'))}
  toast('Notes saved','ok');
}
function assignVolunteer(id){
  const h=S.households.get(id);if(!h)return;const name=$('assignInput').value.trim();h.assignedTo=name;
  const dbId=S.householdDbIds.get(id);
  if(dbId){fetch(`/api/households/${dbId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({assignedTo:name})}).catch(e=>toast('Failed to save assignment: '+e.message,'err'))}
  toast(name?`Assigned to ${name}`:'Assignment cleared','ok');selectHousehold(id);
}
function removeTag(id,tag){
  const h=S.households.get(id);if(!h)return;h.tags=h.tags.filter(t=>t!==tag);
  const dbId=S.householdDbIds.get(id);
  if(dbId){fetch(`/api/households/${dbId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({tags:h.tags})}).catch(e=>toast('Failed to update tags: '+e.message,'err'))}
  selectHousehold(id);
}
function addTagPrompt(id){
  const tag=prompt('Enter tag name:');if(!tag||!tag.trim())return;
  const h=S.households.get(id);if(!h)return;if(!h.tags.includes(tag.trim()))h.tags.push(tag.trim());
  const dbId=S.householdDbIds.get(id);
  if(dbId){fetch(`/api/households/${dbId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({tags:h.tags})}).catch(e=>toast('Failed to update tags: '+e.message,'err'))}
  selectHousehold(id);
}

/* ========== VISIT MODAL ========== */
function openVisitModal(id){
  const h=S.households.get(id);if(!h)return;const now=new Date();
  $('visitModalBody').innerHTML=`
    <div><label class="block text-sm font-medium text-muted mb-1.5">Volunteer Name</label><input id="vmVolunteer" type="text" value="${esc(S.user.name)}" class="w-full"></div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="block text-sm font-medium text-muted mb-1.5">Date</label><input id="vmDate" type="date" value="${now.toISOString().slice(0,10)}" class="w-full"></div>
      <div><label class="block text-sm font-medium text-muted mb-1.5">Time</label><input id="vmTime" type="time" value="${now.toTimeString().slice(0,5)}" class="w-full"></div>
    </div>
    <div><label class="block text-sm font-medium text-muted mb-1.5">Visit Outcome</label><select id="vmOutcome" class="w-full">${OUTCOMES.map(o=>`<option value="${o}">${o}</option>`).join('')}</select></div>
    <div><label class="block text-sm font-medium text-muted mb-1.5">Status After Visit</label><select id="vmStatus" class="w-full">${Object.entries(STATUS_CONFIG).map(([k,v])=>`<option value="${k}" ${h.status===k?'selected':''}>${v.label}</option>`).join('')}</select></div>
    <div><label class="block text-sm font-medium text-muted mb-1.5">Notes</label><textarea id="vmNotes" rows="3" placeholder="What happened during the visit..." class="w-full"></textarea></div>
    <button onclick="submitVisit('${id}')" class="btn btn-primary w-full justify-center py-3 text-base"><i class="fa-solid fa-check"></i> Record Visit</button>`;
  $('visitModal').classList.remove('hidden');
}
function closeVisitModal(){$('visitModal').classList.add('hidden')}
function submitVisit(id){
  const h=S.households.get(id);if(!h)return;
  const visit={volunteer:$('vmVolunteer').value.trim()||'Unknown',date:$('vmDate').value,time:$('vmTime').value,outcome:$('vmOutcome').value,statusAfter:$('vmStatus').value,notes:$('vmNotes').value.trim()};
  if(!visit.date){toast('Please enter a date','warn');return}
  h.visits.push(visit);h.status=visit.statusAfter;
  closeVisitModal();toast('Visit recorded','ok');selectHousehold(id);
  const dbId=S.householdDbIds.get(id);
  if(dbId){fetch(`/api/households/${dbId}/visits`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(visit)}).catch(e=>toast('Failed to save visit: '+e.message,'err'))}
  if(S.currentView==='map')updateMapMarkers();if(S.currentView==='search')doSearch();
}

/* ========== USER MANAGEMENT ========== */
const ROLE_CFG={admin:{label:'Admin',color:'#D4943A',bg:'rgba(212,148,58,0.12)',border:'rgba(212,148,58,0.25)'},staff:{label:'Staff',color:'#3FB950',bg:'rgba(63,185,80,0.12)',border:'rgba(63,185,80,0.25)'},volunteer:{label:'Volunteer',color:'#58A6FF',bg:'rgba(88,166,255,0.12)',border:'rgba(88,166,255,0.25)'}};

async function renderUsersView(){
  const v=$('usersView');
  v.innerHTML='<div class="flex items-center justify-center py-20"><i class="fa-solid fa-spinner fa-spin text-accent text-2xl"></i></div>';
  let users=[];
  try{const res=await fetch('/api/users');if(res.ok)users=await res.json()}catch(e){toast('Failed to load users','err');return}
  const rc=r=>ROLE_CFG[r]||ROLE_CFG.volunteer;
  v.innerHTML=`
    <div class="max-w-2xl mx-auto fade-in">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="font-display text-2xl font-bold">Manage Users</h2>
          <p class="text-muted text-sm">${users.length} user${users.length!==1?'s':''}</p>
        </div>
        <button onclick="openUserModal()" class="btn btn-primary text-sm"><i class="fa-solid fa-plus"></i> Add User</button>
      </div>
      <div class="space-y-2">
        ${users.map(u=>{const c=rc(u.role);return`
        <div class="bg-card border border-border rounded-xl p-4 flex items-center gap-4">
          <div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0" style="background:${c.bg};color:${c.color};border:1px solid ${c.border}">${esc(u.name.split(' ').map(w=>w[0]).join('').slice(0,2))}</div>
          <div class="min-w-0 flex-1">
            <p class="font-semibold text-sm">${esc(u.name)} ${u.id===S.user.id?'<span class="text-muted text-xs font-normal">(you)</span>':''}</p>
            <p class="text-xs text-muted">@${esc(u.username)} · Created ${new Date(u.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</p>
          </div>
          <span class="px-2.5 py-1 rounded-lg text-xs font-semibold flex-shrink-0" style="background:${c.bg};color:${c.color};border:1px solid ${c.border}">${c.label}</span>
          <div class="flex gap-1 flex-shrink-0">
            <button onclick='openUserModal(${JSON.stringify(u)})' class="btn btn-secondary text-xs py-1.5 px-2.5" title="Edit"><i class="fa-solid fa-pen"></i></button>
            ${u.id!==S.user.id?`<button onclick="deleteUser('${u.id}','${esc(u.name)}')" class="btn btn-secondary text-xs py-1.5 px-2.5 hover:!bg-err/10 hover:!text-err hover:!border-err/20" title="Delete"><i class="fa-solid fa-trash"></i></button>`:''}
          </div>
        </div>`}).join('')}
      </div>
    </div>`;
}

function openUserModal(user){
  $('umId').value=user?user.id:'';
  $('umName').value=user?user.name:'';
  $('umUsername').value=user?user.username:'';
  $('umPassword').value='';
  $('umRole').value=user?user.role:'volunteer';
  $('userModalTitle').textContent=user?'Edit User':'Add User';
  $('umPwHint').textContent=user?'(leave blank to keep current)':'';
  $('umUsername').readOnly=!!user;
  $('umUsername').style.opacity=user?0.5:1;
  const m=$('userModal');m.classList.remove('hidden');
}
function closeUserModal(){$('userModal').classList.add('hidden')}

async function saveUser(){
  const id=$('umId').value;
  const name=$('umName').value.trim();
  const username=$('umUsername').value.trim().toLowerCase();
  const password=$('umPassword').value;
  const role=$('umRole').value;
  if(!name||!username){toast('Name and username are required','warn');return}
  if(!id&&!password){toast('Password is required for new users','warn');return}
  try{
    let res;
    if(id){
      const body={name,role};
      if(password)body.password=password;
      res=await fetch(`/api/users/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    }else{
      res=await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,name,role})});
    }
    if(!res.ok){const e=await res.json().catch(()=>({}));toast(e.error||'Failed to save user','err');return}
    closeUserModal();toast(id?'User updated':'User created','ok');renderUsersView();
    /* If editing self, update session */
    if(id===S.user.id){S.user.name=name;S.user.role=role;$('userName').textContent=name;$('userRole').textContent=role;$('userAvatar').textContent=name.split(' ').map(w=>w[0]).join('').slice(0,2)}
  }catch(e){toast('Error: '+e.message,'err')}
}

async function deleteUser(id,name){
  if(!confirm(`Delete user "${name}"? This cannot be undone.`))return;
  try{
    const res=await fetch(`/api/users/${id}`,{method:'DELETE'});
    if(!res.ok){const e=await res.json().catch(()=>({}));toast(e.error||'Failed to delete','err');return}
    toast(`Deleted ${name}`,'ok');renderUsersView();
  }catch(e){toast('Error: '+e.message,'err')}
}

/* ========== GPS ========== */
function initGPS(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    S.gpsPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    const el=$('gpsIndicator');el.classList.remove('hidden');el.classList.add('flex');
  },()=>{},{enableHighAccuracy:true,timeout:10000});
}

/* ========== INIT ========== */
function init(){
  initAuth();initGPS();
  $('visitModal').onclick=e=>{if(e.target===$('visitModal'))closeVisitModal()};
  $('userModal').onclick=e=>{if(e.target===$('userModal'))closeUserModal()};
  document.onkeydown=e=>{if(e.key==='Escape'){if(!$('userModal').classList.contains('hidden'))closeUserModal();else if(!$('visitModal').classList.contains('hidden'))closeVisitModal();else if(!$('detailsPanel').classList.contains('hidden'))closeDetails()}};
}
init();
</script>
</body>
